name: Deploy GitHub Pages (with retry)name: Deploy GitHubon:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build site
        uses: actions/jekyll-build-pages@v1

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        attempt: [1, 2, 3]

    steps:
      - name: Deploy attempt ${{ matrix.attempt }}
        id: deploy
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Stop if success
        if: steps.deploy.outcome == 'success'
        run: echo "Deploy OK"

      - name: Wait before retry
        if: steps.deploy.outcome != 'success' && matrix.attempt < 3
        run: sleep 30

      - name: Fail to retry
        if: steps.deploy.outcome != 'success'
        run: exit 1


