<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Reflexa360</title>

<link rel="stylesheet" href="dashboard.css">

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <img src="Reflexa360.jpg">

    <div class="menu-item active" onclick="mostrar('dashboard', this)">📊 Dashboard</div>
    <div class="menu-item" onclick="mostrar('turmas', this)">📚 Turmas</div>
    <div class="menu-item" onclick="mostrar('config', this)">⚙️ Configurações</div>
    <div class="menu-item" onclick="logout()">🚪 Sair</div>

</div>

<div class="main">

<h2>Visão da Turma</h2>
<h3 id="prof"></h3>

<!-- ================= DASHBOARD ================= -->
<div id="dashboard">

<div class="card">
<label>Selecione a turma</label><br><br>
<select onchange="carregarTurma(this.value)">
<option value="">Selecione...</option>
<option value="A">Fundamental I - A</option>
<option value="B">Fundamental I - B</option>
</select>
</div>

<div class="card">
<h3>Alunos</h3>
<div id="listaAlunos"></div>
</div>

<div class="card">
<h3>Evolução por Matéria</h3>
<option value="">Selecione...</option>
<select id="sel" onchange="mostrarAluno()"></select>
<div id="detalhe"></div>
</div>

<div class="card">
<h3>Diagnóstico Inteligente</h3>
<div id="diagnostico">Selecione um aluno</div>
</div>

</div>

<!-- ================= TURMAS ================= -->
<div id="turmas" style="display:none;">

<h2>Visão das Turmas</h2>

<div class="card">
<h3>Turmas</h3>

<div id="listaTurmas"></div>

</div>

<div class="card" id="boxTurma" style="display:none;">
<h3>Alunos</h3>
<div id="listaTurma"></div>
</div>

</div>

<!-- ================= CONFIG ================= -->
<div id="config" style="display:none;">
<div class="card">
<h3>Configurações</h3>

<div class="aluno">🔑 Alterar senha</div>
<div class="aluno">🌙 Tema escuro</div>
<div class="aluno">👤 Perfil</div>

</div>
</div>

</div>

<script>

let alunos=[];

function init(){
let p=new URLSearchParams(location.search);
document.getElementById("prof").innerText="Professor: "+p.get("prof");
}

function mostrar(sec, el){

document.getElementById("dashboard").style.display="none";
document.getElementById("turmas").style.display="none";
document.getElementById("config").style.display="none";

document.getElementById(sec).style.display="block";

document.querySelectorAll(".menu-item").forEach(i=>i.classList.remove("active"));
if(el) el.classList.add("active");

if(sec==="turmas") carregarListaTurmas();
}

function logout(){
location.href="index.html";
}

/* ================= DASHBOARD ================= */

function carregarTurma(turma){

if(turma==="A"){
alunos=[

{
nome:"Lucas",
materias:{
Matemática:4, Português:6, Ciências:5, História:6
}
},

{
nome:"Maria",
materias:{
Matemática:8, Português:9, Ciências:8, História:8
}
}

];
}

if(turma==="B"){
alunos=[

{
nome:"Pedro",
materias:{
Matemática:5, Português:6, Ciências:5, História:6
}
},

{
nome:"Carlos",
materias:{
Matemática:7, Português:7, Ciências:8, História:7
}
}

];
}

let lista="";
let opt="<option></option>";

alunos.forEach(a=>{

let notas=Object.values(a.materias);
let media=(notas.reduce((x,y)=>x+y)/notas.length).toFixed(1);

let status=media<6?"critico":"ok";

lista+=`
<div class="aluno ${status}">
<strong>${a.nome}</strong> — Média ${media}
</div>
`;

opt+=`<option>${a.nome}</option>`;

});

listaAlunos.innerHTML=lista;
sel.innerHTML=opt;
}

/* DETALHE */
function mostrarAluno(){

let a=alunos.find(x=>x.nome===sel.value);
if(!a) return;

let html="";
Object.entries(a.materias).forEach(([m,n])=>{
html+=`${m}: ${n}<br>`;
});

detalhe.innerHTML=html;

let fracas=Object.entries(a.materias).filter(([m,n])=>n<6);

if(fracas.length){

diagnostico.innerHTML=`
<div class="alerta">
<strong>${a.nome}</strong><br><br>
⚠ Dificuldade em:<br>
${fracas.map(([m,n])=>`• ${m} (${n})`).join("<br>")}
</div>
`;

}else{
diagnostico.innerHTML=`<div class="okBox">✅ Bom desempenho</div>`;
}

}

/* ================= TURMAS ================= */

function carregarListaTurmas(){

let turmas=[
"Fundamental I - A",
"Fundamental I - B"
];

let html="";

turmas.forEach(t=>{

html+=`
<div class="aluno linha" onclick="abrirTurma('${t}')">

<span>📘 ${t}</span>

<span>
<button onclick="event.stopPropagation(); editarTurma('${t}')">✏️</button>
<button onclick="event.stopPropagation(); excluirTurma('${t}')">🗑</button>
</span>

</div>
`;

});

listaTurmas.innerHTML=html;
}

function abrirTurma(nome){

let nomes=[];

if(nome==="Fundamental I - A"){
nomes=["Lucas","Maria"];
}

if(nome==="Fundamental I - B"){
nomes=["Pedro","Carlos"];
}

let html="";

nomes.forEach(n=>{

html+=`
<div class="aluno linha">

<span>${n}</span>

<span>
<button onclick="editarAluno('${n}')">✏️</button>
<button onclick="excluirAluno('${n}')">🗑</button>
</span>

</div>
`;

});

listaTurma.innerHTML=html;
boxTurma.style.display="block";
}

/* AÇÕES */
function editarTurma(n){ alert("Editar turma: "+n); }
function excluirTurma(n){ alert("Excluir turma: "+n); }

function editarAluno(n){ alert("Editar: "+n); }
function excluirAluno(n){ alert("Excluir: "+n); }

init();

</script>

</body>
</html>
